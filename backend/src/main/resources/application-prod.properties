# InfraTrack Backend - Production Profile
# This profile is loaded when SPRING_PROFILES_ACTIVE=prod
# All values are read from environment variables for security

# ========== SERVER ==========
server.port=4000
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,application/javascript,text/css
server.compression.min-response-size=1024

# ========== DATABASE (Production) ==========
# Read from environment variables - no defaults for security
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# ========== JPA/HIBERNATE (Production) ==========
# Schema is managed by Flyway migrations; Hibernate validates only.
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ========== FLYWAY (Production) ==========
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# ========== LOGGING (Production) ==========
# Reduce verbosity in production
logging.level.root=WARN
logging.level.com.infratrack=INFO
logging.level.org.springframework.web=WARN
logging.level.org.apache.catalina=WARN

# ========== ACTUATOR (Production) ==========
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.endpoint.health.show-components=never
management.info.env.enabled=false
management.info.java.enabled=false
management.info.os.enabled=false
management.info.build.enabled=false
management.info.git.enabled=false
management.health.db.enabled=true
management.health.flyway.enabled=true

# ========== MAIL (Production SMTP) ==========
# Read SMTP configuration from environment variables
spring.mail.host=${SPRING_MAIL_HOST}
spring.mail.port=${SPRING_MAIL_PORT}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.from=${SPRING_MAIL_FROM}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:true}

# ========== FIREBASE ==========
firebase.service-account-path=${FIREBASE_SERVICE_ACCOUNT_PATH}

# ========== OPENAPI / SWAGGER (Production) ==========
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# ========== ACCOUNT ACTIVATION ==========
# IMPORTANT: ACTIVATION_LINK_BASE_URL must be customized per application:
# - For web applications: Use HTTPS URL (e.g., https://yourdomain.com/activate)
# - For mobile applications: Use deep link (e.g., yourapp://activate-account)
# - The secure activation token will be appended as ?token=<secure-token>
app.activation-token-expiration-hours=${ACTIVATION_TOKEN_EXPIRATION_HOURS:24}
app.activation-link-base-url=${ACTIVATION_LINK_BASE_URL}

# ========== CORS (Production) ==========
# CORS is configured in SecurityConfig via FRONTEND_ORIGIN environment variable
# See backend/src/main/java/com/infratrack/config/SecurityConfig.java
app.cors.allowed-origins=${FRONTEND_ORIGIN}

# ========== JWT (Production) ==========
# Production JWT signing secret must be provided via JWT_SECRET environment variable
# No fallback to hardcoded default for security
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ========== OPERATIONAL DOCUMENT STORAGE (Production) ==========
# Local filesystem path for UC-012 uploaded files (V1).
# Docker Compose mounts operational-documents-data to /app/data/operational-documents.
app.operational-documents.storage-path=${OPERATIONAL_DOCUMENTS_STORAGE_PATH:/app/data/operational-documents}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ========== INITIAL ADMINISTRATOR BOOTSTRAP (Production) ==========
# Disabled by default. Enable only for controlled first-time provisioning.
app.bootstrap.admin.enabled=${BOOTSTRAP_ADMIN_ENABLED:false}
app.bootstrap.admin.name=${BOOTSTRAP_ADMIN_NAME:Administrator}
app.bootstrap.admin.email=${BOOTSTRAP_ADMIN_EMAIL:}
app.bootstrap.admin.password=${BOOTSTRAP_ADMIN_PASSWORD:}

# ========== PREVENTIVE SCHEDULER (Production) ==========
# Disabled by default. Enable only when automated candidate discovery is required.
app.preventive.scheduler.enabled=${PREVENTIVE_SCHEDULER_ENABLED:false}
app.preventive.scheduler.cron=${PREVENTIVE_SCHEDULER_CRON:0 0 6 * * *}

# ========== INSPECTION VISIBILITY POLICY (Production) ==========
# DEPARTMENT (default) or ORGANIZATION
# Override using either:
# - INSPECTION_VISIBILITY_POLICY
# - app.policies.inspection.visibility (env var: APP_POLICIES_INSPECTION_VISIBILITY)
app.policies.inspection.visibility=${APP_POLICIES_INSPECTION_VISIBILITY:DEPARTMENT}

# Production Notes:
#
# 1. Database Migrations:
#    - Flyway applies versioned SQL from classpath:db/migration on startup
#    - Keep SPRING_JPA_HIBERNATE_DDL_AUTO=validate (default)
#    - Existing non-empty databases are baselined at version 1, then V2+ run
#    - Fresh databases run all migrations from V1
# 
# 2. Security:
#    - All secrets must come from environment variables (.env file)
#    - Never hardcode passwords or API keys
#    - Use strong, randomly generated values
#    - Rotate secrets regularly
# 
# 3. Email:
#    - Configure with production SMTP provider
#    - Test email delivery in staging environment
#    - Monitor bounce and delivery rates
# 
# 4. Logging:
#    - Production uses WARN level to reduce noise
#    - Application logs (com.infratrack) at INFO level
#    - Consider centralized logging (ELK, Splunk) for production
