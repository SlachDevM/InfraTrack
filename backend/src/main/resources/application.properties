spring.application.name=InfraTrack
server.port=4000

# Response compression
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,application/javascript,text/css
server.compression.min-response-size=1024

# Default profile: development (override with SPRING_PROFILES_ACTIVE=prod for production)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/infratrack}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:appuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:apppass}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Flyway schema management (V1 baseline)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

spring.mail.host=localhost
spring.mail.port=1025
spring.mail.from=noreply@infratrack.local

spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

firebase.service-account-path=${FIREBASE_SERVICE_ACCOUNT_PATH:}

# OpenAPI / Swagger (enabled in development; disabled in production profile)
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# Login rate limiting (POST /api/auth/login only)
app.auth.login-rate-limit.max-attempts-per-minute=10

# Account activation configuration
# IMPORTANT: app.activation-link-base-url is a TEMPLATE PLACEHOLDER
# Each application must customize this value:
# - For web: Use HTTPS URL (e.g., https://yourdomain.com/activate)
# - For mobile: Use deep link (e.g., yourapp://activate-account)
# The activation token will be appended as ?token=<secure-token>
app.activation-token-expiration-hours=${ACTIVATION_TOKEN_EXPIRATION_HOURS:24}
app.activation-link-base-url=${ACTIVATION_LINK_BASE_URL:app://activate-account}

# CORS configuration (local development defaults)
app.cors.allowed-origins=${FRONTEND_ORIGIN:http://localhost:3000,http://localhost:80,http://localhost}

# Operational document storage (local filesystem for V1)
# Override with OPERATIONAL_DOCUMENTS_STORAGE_PATH; Docker Compose uses /app/data/operational-documents.
app.operational-documents.storage-path=${OPERATIONAL_DOCUMENTS_STORAGE_PATH:./data/operational-documents}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# JWT configuration (local development uses hardcoded default for backward compatibility)
jwt.secret=${JWT_SECRET:MySuperSecretKeyForInfraTrackLocalDevOnlyChangeMe123456789}

# Initial administrator bootstrap (fresh installation only; idempotent)
app.bootstrap.admin.enabled=${BOOTSTRAP_ADMIN_ENABLED:true}
app.bootstrap.admin.name=${BOOTSTRAP_ADMIN_NAME:Administrator}
app.bootstrap.admin.email=${BOOTSTRAP_ADMIN_EMAIL:admin@infratrack.local}
app.bootstrap.admin.password=${BOOTSTRAP_ADMIN_PASSWORD:change-me}

# Actuator (production-safe: health and info only)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.endpoint.health.show-components=never
management.info.env.enabled=false
management.info.java.enabled=false
management.info.os.enabled=false
management.info.build.enabled=false
management.info.git.enabled=false
management.health.db.enabled=true
management.health.flyway.enabled=true

# Logging (concise operational output; no request-body logging)
logging.level.org.springframework.web=WARN
logging.level.org.apache.catalina=WARN
