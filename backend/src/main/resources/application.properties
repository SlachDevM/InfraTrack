spring.application.name=InfraTrack
server.port=4000

# Default profile: development (override with SPRING_PROFILES_ACTIVE=prod for production)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/infratrack}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:appuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:apppass}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.mail.host=localhost
spring.mail.port=1025
spring.mail.from=noreply@infratrack.local

spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

firebase.service-account-path=${FIREBASE_SERVICE_ACCOUNT_PATH:}

# Account activation configuration
# IMPORTANT: app.activation-link-base-url is a TEMPLATE PLACEHOLDER
# Each application must customize this value:
# - For web: Use HTTPS URL (e.g., https://yourdomain.com/activate)
# - For mobile: Use deep link (e.g., yourapp://activate-account)
# The activation token will be appended as ?token=<secure-token>
app.activation-token-expiration-hours=${ACTIVATION_TOKEN_EXPIRATION_HOURS:24}
app.activation-link-base-url=${ACTIVATION_LINK_BASE_URL:app://activate-account}

# CORS configuration (local development defaults)
app.cors.allowed-origins=${FRONTEND_ORIGIN:http://localhost:3000,http://localhost:80,http://localhost}

# JWT configuration (local development uses hardcoded default for backward compatibility)
jwt.secret=${JWT_SECRET:MySuperSecretKeyForInfraTrackLocalDevOnlyChangeMe123456789}
