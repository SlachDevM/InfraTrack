name: infratrack

# Local development stack — uses the dev Spring profile (see application.properties).

services:
  backend:
    build:
      context: ./backend
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    ports:
      - '4000:4000'
    restart: unless-stopped
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/infratrack
      - SPRING_DATASOURCE_USERNAME=appuser
      - SPRING_DATASOURCE_PASSWORD=apppass
      - SPRING_JPA_HIBERNATE_DDL_AUTO=validate
      - JWT_SECRET=local-dev-secret-change-me
      - SPRING_MAIL_HOST=mailpit
      - SPRING_MAIL_PORT=1025
      - SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH=false
      - SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE=false
      - SPRING_PROFILES_ACTIVE=dev
      - OPERATIONAL_DOCUMENTS_STORAGE_PATH=/app/data/operational-documents
      - BOOTSTRAP_ADMIN_ENABLED=true
      - BOOTSTRAP_ADMIN_NAME=Administrator
      - BOOTSTRAP_ADMIN_EMAIL=admin@infratrack.local
      - BOOTSTRAP_ADMIN_PASSWORD=change-me
      - ACTIVATION_LINK_BASE_URL=http://localhost:3000/activate
      - APP_TIMEZONE=Australia/Sydney
      - TZ=Australia/Sydney
      - JAVA_TOOL_OPTIONS=-Duser.timezone=Australia/Sydney
    volumes:
      - operational-documents-data:/app/data/operational-documents
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:4000/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - '3000:8080'
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8080/ || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  postgres:
    image: postgres:16
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: infratrack
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d infratrack"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: app-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
      
volumes:
  pgdata:
  operational-documents-data:
