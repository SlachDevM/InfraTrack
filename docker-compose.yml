name: infratrack
version: '3.8'

# Local development stack — uses the dev Spring profile (see application.properties).

services:
  backend:
    build: ./backend
    ports:
      - '4000:4000'
    restart: unless-stopped
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/infratrack
      - SPRING_DATASOURCE_USERNAME=appuser
      - SPRING_DATASOURCE_PASSWORD=apppass
      - SPRING_JPA_HIBERNATE_DDL_AUTO=validate
      - JWT_SECRET=local-dev-secret-change-me
      - FIREBASE_SERVICE_ACCOUNT_PATH=/app/firebase-service-account.json
      - SPRING_MAIL_HOST=mailpit
      - SPRING_MAIL_PORT=1025
      - SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH=false
      - SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE=false
      - SPRING_PROFILES_ACTIVE=dev
      - OPERATIONAL_DOCUMENTS_STORAGE_PATH=/app/data/operational-documents
    volumes:
      - ./backend/firebase-service-account.json:/app/firebase-service-account.json:ro
      - operational-documents-data:/app/data/operational-documents
    depends_on:
      - postgres
      - mailpit

  frontend:
    build: ./frontend
    ports:
      - '3000:80'
    restart: unless-stopped
    depends_on:
      - backend

  postgres:
    image: postgres:16
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: infratrack
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
    volumes:
      - pgdata:/var/lib/postgresql/data

  mailpit:
    image: axllent/mailpit:latest
    container_name: app-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
      
volumes:
  pgdata:
  operational-documents-data: