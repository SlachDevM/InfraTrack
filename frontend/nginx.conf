server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # Content-Security-Policy (V2.4.x DT-2A / DT-2A.1) — enforced at the frontend nginx layer only.
    # JWT Bearer + localStorage architecture is unchanged (BDR-003).
    # connect-src: https: covers production VITE_API_BASE_URL; http://localhost:4000 supports
    # local Docker Compose where the API is reached from the browser on the host.
    # upgrade-insecure-requests omitted — not all deployments are HTTPS-only (DT-2A.1).
    # style-src 'self' only — React style={{...}} props do not require 'unsafe-inline' (DT-2A.1).
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' https: http://localhost:4000; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self';" always;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
