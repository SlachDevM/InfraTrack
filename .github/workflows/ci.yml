name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run unit tests
        run: mvn clean test

      - name: Publish JaCoCo coverage summary
        if: always()
        run: |
          python3 <<'EOF'
          import os
          import xml.etree.ElementTree as ET
          from pathlib import Path

          xml_path = Path("target/site/jacoco/jacoco.xml")
          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")

          def pct(covered, missed):
              total = covered + missed
              return (covered / total * 100) if total else 0.0

          lines = ["## Backend Coverage", ""]
          if not xml_path.exists():
              lines.append("_JaCoCo XML report not found. Run `mvn clean test` to generate coverage._")
          else:
              report = ET.parse(xml_path).getroot()
              labels = {
                  "INSTRUCTION": "Instruction Coverage",
                  "BRANCH": "Branch Coverage",
                  "LINE": "Lines Covered",
              }
              for counter_type, label in labels.items():
                  counter = report.find(f"counter[@type='{counter_type}']")
                  if counter is not None:
                      missed = int(counter.get("missed", 0))
                      covered = int(counter.get("covered", 0))
                      lines.append(f"- **{label}:** {pct(covered, missed):.1f}%")
              lines.extend([
                  "",
                  "Download the **jacoco-html-report** or **jacoco-xml-report** artifact from this workflow run.",
                  "",
                  "_Coverage is informational only. No build failure is triggered by coverage thresholds (Sprint 0)._",
                  "_Future quality gate: 80% minimum instruction coverage (not enabled)._",
              ])

          output = "\n".join(lines) + "\n"
          if summary_path:
              Path(summary_path).write_text(output, encoding="utf-8")
          else:
              print(output)
          EOF

      - name: Package application
        run: mvn package -DskipTests

      - name: Upload JaCoCo HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-html-report
          path: backend/target/site/jacoco/
          if-no-files-found: warn

      - name: Upload JaCoCo XML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-xml-report
          path: backend/target/site/jacoco/jacoco.xml
          if-no-files-found: warn

      - name: OWASP dependency check
        run: mvn org.owasp:dependency-check-maven:check -DfailBuildOnCVSS=9

      - name: Upload dependency check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: backend/target/dependency-check-report.*
          if-no-files-found: ignore

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests
        run: npm test -- --run

      - name: Build production bundle
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Docker Compose configuration
        run: docker compose -f docker-compose.yml config

      - name: Build Docker images
        run: |
          docker compose -f docker-compose.yml build backend frontend
